name: Bug report
description: Report something that is not working correctly.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the smallest set of steps that reproduces the issue.
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "macOS 14.x"
  - type: textarea
    id: notes
    attributes:
      label: Additional notes
      description: Please redact API keys, screenshots, OCR text, and private activity data.
