<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Trace</title>
    <link rel="stylesheet" href="../node_modules/katex/dist/katex.min.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <aside class="sidebar">
      <button class="brand" id="openSettings" title="设置">
        <span class="brand-mark">◎</span>
        <span class="brand-copy">
          <strong>Trace</strong>
          <small>记录与教练</small>
        </span>
      </button>

      <nav class="nav-stack" aria-label="主导航">
        <small class="nav-label" data-i18n="工作台">工作台</small>
        <button class="nav active" data-view="today">今日</button>
        <button class="nav" data-view="planning">规划</button>
        <button class="nav" data-view="monitor">监控</button>

        <div class="coach-nav">
          <div class="coach-nav-head">
            <button class="nav coach-main" data-view="coach">教练</button>
            <button class="icon-btn" id="newConversation" title="新对话">+</button>
            <button class="icon-btn" id="toggleCoachList" title="收起对话">⌄</button>
          </div>
          <div id="conversationList" class="conversation-list"></div>
        </div>
      </nav>

      <div class="sidebar-bottom">
        <div class="side-card">
          <span id="recordDot"></span>
          <div>
            <strong id="recordState">记录暂停</strong>
            <small id="latestApp">等待采样</small>
          </div>
          <label class="switch"><input id="toggleRecord" type="checkbox" /><span></span></label>
        </div>
      </div>
    </aside>

    <main>
      <section id="today" class="view active">
        <header>
          <div>
            <h1>今日</h1>
            <p id="todayDate"></p>
          </div>
        </header>
        <div class="two-col responsive">
          <article class="card">
            <h2 data-i18n="今日计划">今日计划</h2>
            <div id="todayPlans" class="list"></div>
          </article>
          <article class="card">
            <h2 data-i18n="目标推进">目标推进</h2>
            <div id="todayGoals" class="list"></div>
          </article>
        </div>
      </section>

      <section id="planning" class="view">
        <header>
          <div>
            <h1>规划</h1>
            <p>长期目标与短期计划</p>
          </div>
        </header>

        <div class="form-grid">
          <article class="card form-card">
            <h2 data-i18n="新计划">新计划</h2>
            <input id="taskTitle" placeholder="计划名称" />
            <textarea id="taskNote" placeholder="完成信号或备注"></textarea>
            <input id="taskProject" placeholder="项目" value="学习" />
            <div class="row">
              <label><span data-i18n="开始日期">开始日期</span><input id="taskStartDate" type="date" /></label>
              <label><span data-i18n="完成日期">完成日期</span><input id="taskDate" type="date" /></label>
            </div>
            <div class="row">
              <label><span data-i18n="预计分钟">预计分钟</span><input id="taskMinutes" type="number" min="5" step="5" value="45" /></label>
              <label><span data-i18n="优先级">优先级</span><select id="taskPriority"><option value="low" data-i18n="低">低</option><option value="medium" selected data-i18n="中">中</option><option value="high" data-i18n="高">高</option></select></label>
            </div>
            <button id="addTask" data-i18n="添加计划">添加计划</button>
          </article>

          <article class="card form-card">
            <h2 data-i18n="新目标">新目标</h2>
            <input id="goalTitle" placeholder="目标名称" />
            <textarea id="goalPurpose" placeholder="为什么做"></textarea>
            <input id="goalMetric" placeholder="衡量方式" />
            <label><span data-i18n="周期天数">周期天数</span><input id="goalDays" type="number" min="1" value="30" /></label>
            <button id="addGoal" data-i18n="添加目标">添加目标</button>
          </article>
        </div>

        <h2 class="section-title" data-i18n="计划日历">计划日历</h2>
        <article class="card">
          <div id="planCalendar" class="list"></div>
        </article>

        <h2 class="section-title" data-i18n="目标日志">目标日志</h2>
        <article class="card">
          <div id="goalBoard" class="goal-log-list"></div>
        </article>
      </section>

      <section id="monitor" class="view">
        <header>
          <div>
            <h1>监控</h1>
            <p>记录时长、应用分布与窗口轨迹</p>
          </div>
          <button id="sampleNow">立即采样</button>
        </header>
        <div class="grid responsive">
          <article class="card">
            <h2 data-i18n="今日记录">今日记录</h2>
            <div id="monitorOverview" class="facts"></div>
          </article>
          <article class="card">
            <h2 data-i18n="当前采样">当前采样</h2>
            <pre id="latestSample">暂无采样</pre>
          </article>
          <article class="card">
            <h2 data-i18n="应用时间">应用时间</h2>
            <div id="appUsage" class="list"></div>
          </article>
          <article class="card">
            <h2 data-i18n="窗口轨迹">窗口轨迹</h2>
            <div id="timeline" class="list"></div>
          </article>
        </div>
      </section>

      <section id="coach" class="view">
        <header>
          <div>
            <h1>教练</h1>
            <p id="coachSubtitle">对话、记忆与规划动作</p>
          </div>
        </header>
        <div class="coach-layout responsive">
          <article class="card chat-card">
            <div id="coachMessages" class="messages"></div>
            <div class="composer">
              <textarea id="coachInput" placeholder="和教练对话"></textarea>
              <button id="sendCoach" data-i18n="发送">发送</button>
            </div>
          </article>
          <aside class="coach-side">
            <article class="card">
              <h2 data-i18n="今日复盘">今日复盘</h2>
              <div id="summaryBody" class="markdown compact">暂无复盘</div>
            </article>
            <article class="card">
              <h2 data-i18n="记忆">记忆</h2>
              <div id="coachMemory"></div>
            </article>
          </aside>
        </div>
      </section>

      <section id="settings" class="view">
        <header>
          <div>
            <h1>设置</h1>
            <p>身份、接口、外观与采样</p>
          </div>
        </header>

        <article class="card form-card">
          <h2 data-i18n="身份信息">身份信息</h2>
          <input id="identityTitle" placeholder="例如：大一计算机科学学生、高中数学偏科生" />
          <p class="hint" data-i18n="教练会把身份信息作为长期背景。修改已有身份会归档当前身份下的记忆与全部对话，再开启新的身份记忆。">教练会把身份信息作为长期背景。修改已有身份会归档当前身份下的记忆与全部对话，再开启新的身份记忆。</p>
          <div class="inline-actions">
            <button id="saveIdentity" data-i18n="保存身份">保存身份</button>
            <span id="identityState">当前：未设置身份</span>
          </div>
        </article>

        <article class="card">
          <h2 data-i18n="已归档对话">已归档对话</h2>
          <div id="archives" class="archive-list"></div>
        </article>

        <article class="card form-card">
          <h2 data-i18n="外观">外观</h2>
          <label><span data-i18n="语言">语言</span><select id="languageSelect">
            <option value="en">English</option>
            <option value="zh-Hans">简体中文</option>
            <option value="zh-Hant">繁體中文</option>
            <option value="ja">日本語</option>
            <option value="ko">한국어</option>
            <option value="fr">Français</option>
            <option value="es">Español</option>
          </select></label>
          <div class="theme-tabs">
            <button class="theme-tab" data-theme="day" data-i18n="日间">日间</button>
            <button class="theme-tab" data-theme="night" data-i18n="暗夜">暗夜</button>
            <button class="theme-tab" data-theme="custom" data-i18n="自定义">自定义</button>
          </div>
          <div id="customColorPanel" class="color-panel">
            <div class="color-row"><span>R</span><input id="colorRed" type="range" min="0" max="63" step="1" /><output id="colorRedValue"></output></div>
            <div class="color-row"><span>G</span><input id="colorGreen" type="range" min="0" max="63" step="1" /><output id="colorGreenValue"></output></div>
            <div class="color-row"><span>B</span><input id="colorBlue" type="range" min="0" max="63" step="1" /><output id="colorBlueValue"></output></div>
          </div>
        </article>

        <article class="card form-card">
          <h2 data-i18n="AI 接口">AI 接口</h2>
          <label>API URL<input id="baseURL" /></label>
          <label><span data-i18n="模型">模型</span><input id="model" /></label>
          <label>API Key<input id="apiKey" type="password" placeholder="使用 Electron safeStorage 加密保存" /></label>
          <button id="saveSettings" data-i18n="保存接口设置">保存接口设置</button>
          <p id="settingsStatus"></p>
        </article>

        <article class="card form-card">
          <h2 data-i18n="采样">采样</h2>
          <label><span data-i18n="采样间隔">采样间隔</span><select id="sampleInterval"><option value="15">15 秒</option><option value="30">30 秒</option><option value="60">60 秒</option><option value="120">120 秒</option></select></label>
          <label class="check"><input id="includeWindowTitles" type="checkbox" /> <span data-i18n="记录窗口标题">记录窗口标题</span></label>
          <label class="check"><input id="captureScreenshots" type="checkbox" /> <span data-i18n="保存屏幕快照并尝试本地 OCR">保存屏幕快照并尝试本地 OCR</span></label>
          <label><span data-i18n="快照间隔（分钟）">快照间隔（分钟）</span><input id="screenshotInterval" type="number" min="5" step="5" value="15" /></label>
        </article>
      </section>
    </main>

    <div id="logModal" class="modal hidden" role="dialog" aria-modal="true">
      <div class="modal-card">
        <button id="closeLogModal" class="modal-close">×</button>
        <small id="modalMeta"></small>
        <h2 id="modalTitle"></h2>
        <div id="modalBody" class="markdown"></div>
      </div>
    </div>

    <script src="../node_modules/katex/dist/katex.min.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
